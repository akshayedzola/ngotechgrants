name: Check official grant links

on:
  schedule:
    - cron: "17 5 1 * *"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Validate grant data
        run: |
          node --check app.js
          node scripts/validate-data.mjs
          node scripts/test-site.mjs
      - name: Check official-source links
        run: node scripts/check-links.mjs
